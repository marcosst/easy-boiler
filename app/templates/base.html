<!DOCTYPE html>
<html lang="pt-BR" x-data="themeManager()" :class="{ 'dark': isDark }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}App{% endblock %}</title>
    <script>
      // Blocking: apply dark class immediately to prevent flash
      (function() {
        var theme = localStorage.getItem('theme') || 'auto';
        var isDark = theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: { light: '#26a69a', DEFAULT: '#26a69a', dark: '#006064' }
            }
          }
        }
      }
    </script>
    <style>
      /* Dark-mode scrollbar */
      .dark .dark-scrollbar::-webkit-scrollbar { width: 8px; }
      .dark .dark-scrollbar::-webkit-scrollbar-track { background: rgb(38 38 38); }
      .dark .dark-scrollbar::-webkit-scrollbar-thumb { background: rgb(82 82 82); border-radius: 4px; }
      .dark .dark-scrollbar::-webkit-scrollbar-thumb:hover { background: rgb(115 115 115); }
      .dark .dark-scrollbar { scrollbar-color: rgb(82 82 82) rgb(38 38 38); }
    </style>
    <script defer src="https://unpkg.com/@alpinejs/collapse@3.14.3/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <script>
      function themeManager() {
        return {
          theme: localStorage.getItem('theme') || 'auto',
          isDark: false,
          mediaQuery: window.matchMedia('(prefers-color-scheme: dark)'),
          init() {
            this.applyTheme();
            this.mediaQuery.addEventListener('change', () => {
              if (this.theme === 'auto') this.applyTheme();
            });
          },
          setTheme(mode) {
            this.theme = mode;
            localStorage.setItem('theme', mode);
            this.applyTheme();
          },
          applyTheme() {
            if (this.theme === 'dark') {
              this.isDark = true;
            } else if (this.theme === 'light') {
              this.isDark = false;
            } else {
              this.isDark = this.mediaQuery.matches;
            }
          }
        }
      }
    </script>
</head>
<body class="bg-slate-100 dark:bg-neutral-900 min-h-screen font-sans transition-colors">
    {% block content %}{% endblock %}
</body>
</html>
