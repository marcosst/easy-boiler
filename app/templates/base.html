<!DOCTYPE html>
<html lang="pt" x-data="themeManager()" :class="{ 'dark': isDark }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}App{% endblock %}</title>
    <script>
      // Blocking: apply dark class + background immediately to prevent flash
      (function() {
        var theme = localStorage.getItem('theme') || 'auto';
        var isDark = theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) document.documentElement.classList.add('dark');
        document.documentElement.style.backgroundImage = isDark ? 'url(/midias/escuro.png)' : 'url(/midias/claro.png)';
        document.documentElement.style.backgroundColor = isDark ? '#1e1e1e' : '#f1f5f9';
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: { light: '#26a69a', DEFAULT: '#26a69a', dark: '#006064' }
            }
          }
        }
      }
    </script>
    <style>
      /* Dark-mode scrollbar — applied globally */
      .dark ::-webkit-scrollbar { width: 8px; height: 8px; }
      .dark ::-webkit-scrollbar-track { background: rgb(38 38 38); }
      .dark ::-webkit-scrollbar-thumb { background: rgb(82 82 82); border-radius: 4px; }
      .dark ::-webkit-scrollbar-thumb:hover { background: rgb(115 115 115); }
      .dark * { scrollbar-color: rgb(82 82 82) rgb(38 38 38); }
      [x-cloak] { display: none !important; }
    </style>
    <script defer src="https://unpkg.com/@alpinejs/collapse@3.14.3/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/@alpinejs/focus@3.14.3/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <script>
      function themeManager() {
        return {
          theme: localStorage.getItem('theme') || 'auto',
          isDark: false,
          mediaQuery: window.matchMedia('(prefers-color-scheme: dark)'),
          init() {
            this.applyTheme();
            this.mediaQuery.addEventListener('change', () => {
              if (this.theme === 'auto') this.applyTheme();
            });
          },
          setTheme(mode) {
            this.theme = mode;
            localStorage.setItem('theme', mode);
            this.applyTheme();
          },
          applyTheme() {
            if (this.theme === 'dark') {
              this.isDark = true;
            } else if (this.theme === 'light') {
              this.isDark = false;
            } else {
              this.isDark = this.mediaQuery.matches;
            }
          }
        }
      }
    </script>
</head>
<body class="min-h-screen font-sans transition-colors bg-cover bg-center bg-fixed bg-no-repeat"
      :style="isDark ? 'background-image: url(/midias/escuro.png); background-color: #1e1e1e' : 'background-image: url(/midias/claro.png); background-color: #f1f5f9'">
    {% block content %}{% endblock %}

    <!-- Pinemix Notification System (global) -->
    <div
      x-data="{
        position: 'top-end',
        autoClose: true,
        autoCloseDelay: 5000,
        notifications: [],
        nextId: 1,
        triggerNotification(message, type) {
          const id = this.nextId++;
          this.notifications.push({ id, message, type, visible: false });
          setTimeout(() => {
            const idx = this.notifications.findIndex(n => n.id === id);
            if (idx > -1) this.notifications[idx].visible = true;
          }, 30);
          if (this.autoClose) {
            setTimeout(() => this.dismissNotification(id), this.autoCloseDelay);
          }
        },
        dismissNotification(id) {
          const idx = this.notifications.findIndex(n => n.id === id);
          if (idx > -1) {
            this.notifications[idx].visible = false;
            setTimeout(() => this.notifications.splice(idx, 1), 300);
          }
        }
      }"
      @notify.window="triggerNotification($event.detail.message, $event.detail.type || 'success')"
    >
      <div
        x-cloak
        x-show="notifications.length > 0"
        role="region"
        aria-label="Notifications"
        class="fixed z-50 flex w-72 gap-2 flex-col-reverse top-4 right-4"
      >
        <template x-for="notification in notifications" :key="notification.id">
          <div
            x-show="notification.visible"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-x-12"
            x-transition:enter-end="opacity-100 translate-x-0"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-x-0"
            x-transition:leave-end="opacity-0 translate-x-12"
            class="flex items-center justify-between gap-4 rounded-lg border border-slate-200/75 bg-white p-4 text-sm shadow-sm dark:border-neutral-700/75 dark:bg-neutral-800"
            role="alert"
            :aria-live="notification.type === 'error' ? 'assertive' : 'polite'"
          >
            <template x-if="notification.type !== 'neutral'">
              <div
                class="flex w-8 h-8 flex-none items-center justify-center rounded-full"
                :class="{
                  'bg-green-100 text-green-700 dark:bg-green-600/25 dark:text-green-100': notification.type === 'success',
                  'bg-rose-100 text-rose-700 dark:bg-rose-600/25 dark:text-rose-100': notification.type === 'error',
                  'bg-teal-100 text-teal-700 dark:bg-teal-600/25 dark:text-teal-100': notification.type === 'info',
                  'bg-amber-100 text-amber-700 dark:bg-amber-600/25 dark:text-amber-100': notification.type === 'warning'
                }"
              >
                <template x-if="notification.type === 'success'">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M12.416 3.376a.75.75 0 0 1 .208 1.04l-5 7.5a.75.75 0 0 1-1.154.114l-3-3a.75.75 0 0 1 1.06-1.06l2.353 2.353 4.493-6.74a.75.75 0 0 1 1.04-.207Z" clip-rule="evenodd"/></svg>
                </template>
                <template x-if="notification.type === 'error'">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4"><path d="M5.28 4.22a.75.75 0 0 0-1.06 1.06L6.94 8l-2.72 2.72a.75.75 0 1 0 1.06 1.06L8 9.06l2.72 2.72a.75.75 0 1 0 1.06-1.06L9.06 8l2.72-2.72a.75.75 0 0 0-1.06-1.06L8 6.94 5.28 4.22Z"/></svg>
                </template>
                <template x-if="notification.type === 'warning'">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M7.5 1.709a.75.75 0 0 1 1 0 8.963 8.963 0 0 0 4.84 2.217.75.75 0 0 1 .654.72 10.499 10.499 0 0 1-5.647 9.672.75.75 0 0 1-.694-.001 10.499 10.499 0 0 1-5.647-9.672.75.75 0 0 1 .654-.719A8.963 8.963 0 0 0 7.5 1.71ZM8 5a.75.75 0 0 1 .75.75v2a.75.75 0 0 1-1.5 0v-2A.75.75 0 0 1 8 5Zm0 7a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"/></svg>
                </template>
                <template x-if="notification.type === 'info'">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M15 8A7 7 0 1 1 1 8a7 7 0 0 1 14 0ZM9 5a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM6.75 8a.75.75 0 0 0 0 1.5h.75v1.75a.75.75 0 0 0 1.5 0v-2.5A.75.75 0 0 0 8.25 8h-1.5Z" clip-rule="evenodd"/></svg>
                </template>
              </div>
            </template>
            <div class="grow" x-text="notification.message"></div>
            <button
              @click="dismissNotification(notification.id)"
              type="button"
              class="flex-none text-slate-500 hover:text-slate-700 active:text-slate-500 dark:text-neutral-400 dark:hover:text-neutral-300"
            >
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5"><path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"/></svg>
            </button>
          </div>
        </template>
      </div>
    </div>
</body>
</html>
