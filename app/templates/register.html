{% extends "base.html" %}
{% block title %}Criar Conta — resumiu{% endblock %}
{% block content %}
<main class="min-h-screen flex items-center justify-center bg-slate-100 dark:bg-neutral-900 px-4">
  <div class="w-full max-w-sm">
    <div class="flex justify-center mb-8">
      <a href="/login">
        <img src="/static/resumiu-header.svg" alt="resumiu" class="h-14">
      </a>
    </div>
    <div class="text-center mb-8">
      <p class="text-sm text-slate-500 dark:text-neutral-500">Crie sua conta</p>
    </div>

    {% if error %}
    <div class="mb-4 text-sm text-red-600 dark:text-red-400 text-center">{{ error }}</div>
    {% endif %}

    <form method="post" action="/register" class="flex flex-col gap-3.5 mb-6">
      <div>
        <input type="text" name="username" placeholder="Username" required pattern="[a-z0-9][a-z0-9-]*" value="{{ username or '' }}"
          class="{{ INPUT_CLS }}">
        <p class="mt-1 ml-1 text-xs text-slate-400 dark:text-neutral-500">Apenas letras minúsculas, números e hífens</p>
      </div>
      <input type="email" name="email" placeholder="Email" required value="{{ email or '' }}"
        class="{{ INPUT_CLS }}">
      <!-- Pinemix Password Strength -->
      <div
        x-data="{
          password: '',
          strength: 0,
          message: '',
          checkStrength() {
            let score = 0;
            if (this.password.length >= 8) {
              if (this.password.length >= 12) score += 20;
              if (/[0-9]/.test(this.password)) score += 20;
              if (/[a-z]/.test(this.password)) score += 20;
              if (/[A-Z]/.test(this.password)) score += 20;
              if (/[^A-Za-z0-9]/.test(this.password)) score += 20;
            } else if (this.password.length > 0) {
              score = 10;
            }
            this.strength = score;
            if (score === 0) this.message = '';
            else if (score === 10) this.message = 'Muito curta';
            else if (score <= 30) this.message = 'Fraca';
            else if (score <= 60) this.message = 'Média';
            else if (score <= 80) this.message = 'Forte';
            else this.message = 'Muito forte!';
          }
        }"
      >
        <input type="password" name="password" placeholder="Senha" required
          x-model="password" @input="checkStrength()"
          class="{{ INPUT_CLS }}">
        <!-- Progress Bar -->
        <div x-show="strength > 0" x-cloak class="mt-1.5 h-1.5 w-full rounded-full bg-slate-200 dark:bg-neutral-700" role="progressbar" :aria-valuenow="strength">
          <div class="h-1.5 rounded-full transition-all duration-300"
            :class="{ 'bg-rose-500': strength <= 30, 'bg-orange-500': strength <= 60 && strength > 30, 'bg-emerald-500': strength > 60 }"
            :style="{ width: strength + '%' }"></div>
        </div>
        <!-- Message -->
        <p x-show="message" x-cloak x-text="message" class="mt-1 text-xs font-medium"
          :class="{ 'text-rose-500': strength <= 30, 'text-orange-500': strength <= 60 && strength > 30, 'text-emerald-500': strength > 60 }"></p>
      </div>
      <input type="password" name="password_confirm" placeholder="Confirmar senha" required
        class="{{ INPUT_CLS }}">
      <button type="submit"
        class="{{ BTN_PRIMARY }}">
        Criar conta
      </button>
    </form>

    <div class="flex items-center gap-3 mb-6">
      <div class="flex-1 h-px bg-slate-300 dark:bg-neutral-700"></div>
      <span class="text-xs text-slate-400 dark:text-neutral-500">ou continue com</span>
      <div class="flex-1 h-px bg-slate-300 dark:bg-neutral-700"></div>
    </div>

    <div class="flex justify-center gap-4 mb-8">
      <a href="/auth/google" class="w-12 h-12 border border-slate-300 dark:border-neutral-700 rounded-xl flex items-center justify-center hover:bg-slate-50 dark:hover:bg-neutral-800 transition-colors" title="Google">
        <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      </a>
      <a href="/auth/github" class="w-12 h-12 border border-slate-300 dark:border-neutral-700 rounded-xl flex items-center justify-center hover:bg-slate-50 dark:hover:bg-neutral-800 transition-colors" title="GitHub">
        <svg class="w-5 h-5 text-slate-700 dark:text-neutral-300" fill="currentColor" viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      </a>
      <a href="/auth/microsoft" class="w-12 h-12 border border-slate-300 dark:border-neutral-700 rounded-xl flex items-center justify-center hover:bg-slate-50 dark:hover:bg-neutral-800 transition-colors" title="Microsoft">
        <svg class="w-5 h-5" viewBox="0 0 23 23"><rect x="1" y="1" width="10" height="10" fill="#f25022"/><rect x="12" y="1" width="10" height="10" fill="#7fba00"/><rect x="1" y="12" width="10" height="10" fill="#00a4ef"/><rect x="12" y="12" width="10" height="10" fill="#ffb900"/></svg>
      </a>
    </div>

    <p class="text-center text-sm text-slate-500 dark:text-neutral-500">
      Já tem conta?
      <a href="/login" class="text-brand hover:underline">Entrar</a>
    </p>
  </div>
</main>
{% endblock %}
