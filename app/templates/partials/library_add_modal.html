{% from "macros/buttons.html" import btn_icon %}
<div
  x-data="{
    show: false,
    selectedType: '',
    loading: false,
    saving: false,
    previewed: false,
    playlistMode: false,
    playlistLoading: false,
    selectType(t) {
      this.selectedType = t;
    },
    reset() {
      this.show = false;
      this.selectedType = '';
      this.loading = false;
      this.saving = false;
      this.previewed = false;
      this.playlistMode = false;
      this.playlistLoading = false;
      const previewArea = document.getElementById('library-preview-area');
      if (previewArea) previewArea.innerHTML = '';
      this.$el.querySelectorAll('form').forEach(f => f.reset());
    }
  }"
  @open-add-modal.window="show = true"
  @close-add-modal.window="saving = true; setTimeout(() => reset(), 800)"
  @exit-playlist-mode.window="playlistMode = false; document.getElementById('playlist-videos-area').innerHTML = ''"
  x-on:keydown.esc.prevent="if(!saving) reset()"
>
  <!-- Pinemix Modal Backdrop -->
  <div
    x-cloak
    x-show="show"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    x-bind:aria-hidden="!show"
    tabindex="-1"
    role="dialog"
    class="fixed inset-0 z-50 overflow-y-auto overflow-x-hidden bg-black/75 p-4 backdrop-blur-sm will-change-auto lg:p-8"
  >
    <!-- Pinemix Modal Dialog -->
    <div
      x-cloak
      x-show="show"
      x-on:click.away="if(!saving) reset()"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 scale-90 -translate-y-full"
      x-transition:enter-end="opacity-100 scale-100 translate-y-0"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100 scale-100 translate-y-0"
      x-transition:leave-end="opacity-0 scale-125 translate-y-full"
      role="document"
      class="relative mx-auto flex w-full max-w-md flex-col overflow-hidden rounded-2xl bg-white shadow-2xl will-change-auto dark:bg-neutral-800 dark:text-neutral-100 max-h-[90vh] dark-scrollbar"
      :class="saving ? 'overflow-hidden' : 'overflow-y-auto'">

      <!-- Header -->
      <div class="flex items-center justify-between px-5 pt-5 pb-2">
        <h3 class="text-base font-bold text-slate-700 dark:text-neutral-300">Adicionar à Biblioteca</h3>
        {{ btn_icon(
          icon='<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>',
          click='reset()',
        ) }}
      </div>

      <div class="px-5 pb-5">
        <!-- Type selector: two cards -->
        <div x-show="!previewed" class="flex gap-3 mb-4">
          <button @click="selectType('youtube')"
                  :class="selectedType === 'youtube' ? 'bg-teal-500 border-teal-500 text-white' : 'bg-slate-50 dark:bg-neutral-700 border-slate-200 dark:border-neutral-600 text-slate-500 dark:text-neutral-400'"
                  class="flex-1 flex flex-col items-center gap-1.5 py-4 rounded-xl border-2 transition-all cursor-pointer"
                  :disabled="loading">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span class="text-xs font-bold uppercase tracking-wider">YouTube</span>
          </button>
          <button @click="selectType('pdf')"
                  :class="selectedType === 'pdf' ? 'bg-teal-500 border-teal-500 text-white' : 'bg-slate-50 dark:bg-neutral-700 border-slate-200 dark:border-neutral-600 text-slate-500 dark:text-neutral-400'"
                  class="flex-1 flex flex-col items-center gap-1.5 py-4 rounded-xl border-2 transition-all cursor-pointer"
                  :disabled="loading">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <span class="text-xs font-bold uppercase tracking-wider">PDF</span>
          </button>
        </div>

        <!-- YouTube input -->
        <div x-show="selectedType === 'youtube' && !previewed" x-transition>
          <form hx-post="/htmx/library/preview"
                hx-target="#library-preview-area"
                hx-swap="innerHTML"
                hx-indicator="#preview-spinner"
                @htmx:before-request="loading = true"
                @htmx:after-request="loading = false">
            <input type="hidden" name="type" value="youtube">
            <input type="hidden" name="subject_id" value="{{ subject.id }}">
            <div class="mb-3">
              <label class="{{ LABEL_CLS }}">URL do vídeo</label>
              <input type="url" name="url" placeholder="https://youtube.com/watch?v=..."
                     class="{{ INPUT_CLS }}"
                     required>
            </div>
            <button type="submit" :disabled="loading"
                    class="{{ BTN_PRIMARY }} flex items-center justify-center">
              <span x-show="!loading">Buscar vídeo</span>
              <svg x-show="loading" x-cloak class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
            </button>
            <!-- Pinemix Skeleton Loader (YouTube preview) -->
            <div x-show="loading" x-cloak class="mt-3 animate-pulse space-y-3">
              <div class="aspect-video bg-slate-200 dark:bg-neutral-700 rounded-lg"></div>
              <div class="h-4 w-3/4 bg-slate-200 dark:bg-neutral-700 rounded-lg"></div>
              <div class="h-10 bg-slate-200 dark:bg-neutral-700 rounded-lg"></div>
            </div>
          </form>
        </div>

        <!-- PDF input -->
        <div x-show="selectedType === 'pdf' && !previewed" x-transition>
          <form hx-post="/htmx/library/preview"
                hx-target="#library-preview-area"
                hx-swap="innerHTML"
                hx-encoding="multipart/form-data"
                hx-indicator="#pdf-spinner"
                @htmx:before-request="loading = true"
                @htmx:after-request="loading = false">
            <input type="hidden" name="type" value="pdf">
            <input type="hidden" name="subject_id" value="{{ subject.id }}">
            <div class="mb-3">
              <label class="{{ LABEL_CLS }}">Arquivo PDF</label>
              <input type="file" name="file" accept=".pdf"
                     @change="if($el.files.length) $el.closest('form').requestSubmit()"
                     class="w-full text-sm text-slate-700 dark:text-neutral-300 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-teal-50 file:text-teal-600 dark:file:bg-teal-900/30 dark:file:text-teal-400 file:cursor-pointer hover:file:bg-teal-100 dark:hover:file:bg-teal-900/50">
            </div>
            <!-- Pinemix Skeleton Loader (PDF processing) -->
            <div x-show="loading" x-cloak class="mt-3 animate-pulse space-y-3">
              <div class="h-48 bg-slate-200 dark:bg-neutral-700 rounded-lg"></div>
              <div class="h-4 w-2/3 bg-slate-200 dark:bg-neutral-700 rounded-lg"></div>
              <div class="h-10 bg-slate-200 dark:bg-neutral-700 rounded-lg"></div>
            </div>
            <p x-show="loading" x-cloak class="mt-2 text-center text-sm text-slate-500 dark:text-neutral-400">Processando PDF...</p>
          </form>
        </div>

        <!-- Preview area (HTMX target) -->
        <div id="library-preview-area" :class="previewed ? '' : 'mt-3'"
             @htmx:after-swap.camel="previewed = $el.children.length > 0"></div>
      </div>

      <!-- Full-modal overlay spinner (save) -->
      <div x-show="saving" x-cloak
           class="absolute inset-0 flex flex-col items-center justify-center gap-4 bg-black/80 rounded-2xl z-20 backdrop-blur-sm">
        <div class="w-14 h-14 border-4 border-teal-500/20 border-t-teal-500 rounded-full animate-spin"></div>
        <span class="text-sm text-teal-400 font-medium">Salvando na biblioteca...</span>
      </div>

      <!-- Full-modal overlay spinner (playlist loading) -->
      <div x-show="playlistLoading" x-cloak
           class="absolute inset-0 flex flex-col items-center justify-center gap-4 bg-black/80 rounded-2xl z-20 backdrop-blur-sm">
        <div class="w-10 h-10 border-[3px] border-teal-500/20 border-t-teal-500 rounded-full animate-spin"></div>
        <span class="text-sm text-teal-400 font-medium">Carregando vídeos da playlist...</span>
      </div>
    </div>
  </div>
</div>
