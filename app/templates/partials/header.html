<!-- HEADER -->
<header class="sticky top-0 z-40 bg-gradient-to-r from-slate-200/60 via-slate-100/30 to-slate-200/60 dark:from-neutral-950/60 dark:via-neutral-900/30 dark:to-neutral-950/60 backdrop-blur-md border-b border-slate-300 dark:border-neutral-800 shadow-sm transition-colors">
  <div class="w-full px-6 h-[72px] flex items-center gap-8">

    <!-- Logo (left) -->
    <a href="/" class="flex-shrink-0">
      <img src="/static/resumiu-header.svg" alt="Logo" class="h-14 w-auto">
    </a>

    <!-- Page title (center) -->
    <div class="flex-1 min-w-0 flex items-center justify-center gap-2">
      <span class="truncate">{{ header_title_text | default(header_title) | safe }}</span>
      {% if header_title_icon %}{{ header_title_icon | safe }}{% endif %}
    </div>

    <!-- User menu (right) — Pinemix Dropdown -->
    <div class="flex justify-end">
      {% if user %}
      <div
        class="relative inline-block"
        x-data="{ open: false }"
        x-on:keydown.esc.prevent.stop="open = false"
      >
        <!-- Dropdown Toggle Button -->
        <button
          type="button"
          @click="open = !open"
          class="flex items-center gap-2 bg-white dark:bg-neutral-700 hover:bg-slate-100 dark:hover:bg-neutral-600 border border-slate-400/50 dark:border-neutral-600/50 rounded-full {{ BTN_H }} pr-3 transition-colors cursor-pointer"
          id="pm-user-dropdown"
          aria-haspopup="true"
          x-bind:aria-expanded="open"
        >
          <div class="{{ BTN_WH }} rounded-full bg-brand dark:bg-brand-dark flex items-center justify-center text-white text-sm font-bold select-none">
            {{ user.initials }}
          </div>
          <span class="text-sm font-medium text-slate-700 dark:text-neutral-300">{{ user.name }}</span>
          <svg class="w-3.5 h-3.5 text-slate-400 dark:text-neutral-500 transition-transform duration-200" :class="open && 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>

        <!-- Dropdown Menu -->
        <div
          x-cloak
          x-show="open"
          x-transition:enter="transition ease-out duration-100"
          x-transition:enter-start="opacity-0 -translate-y-3"
          x-transition:enter-end="opacity-100 translate-y-0"
          x-transition:leave="transition ease-in duration-75"
          x-transition:leave-start="opacity-100 translate-y-0"
          x-transition:leave-end="opacity-0 translate-y-10"
          x-on:click.outside="open = false"
          role="menu"
          aria-labelledby="pm-user-dropdown"
          class="absolute right-0 mt-2 w-56 origin-top-right rounded-xl shadow-xl dark:shadow-neutral-950"
        >
          <div class="divide-y divide-slate-100 rounded-xl bg-white ring-1 ring-black/5 dark:divide-neutral-700/75 dark:bg-neutral-800 dark:ring-neutral-700/75">
            <!-- User identity card -->
            <div class="flex items-center gap-3 px-4 py-3">
              <div class="w-9 h-9 rounded-full bg-brand dark:bg-brand-dark flex items-center justify-center text-white text-sm font-bold flex-shrink-0">
                {{ user.initials }}
              </div>
              <div class="min-w-0">
                <div class="text-sm font-semibold text-slate-700 dark:text-neutral-300 truncate">{{ user.name }}</div>
                <div class="text-xs text-slate-400 dark:text-neutral-500 truncate">{{ user.email }}</div>
              </div>
            </div>

            <!-- Menu items -->
            <div class="px-2.5 py-2">
              <a href="/profile" role="menuitem" @click="open = false"
                class="group flex items-center gap-2.5 rounded-lg px-2.5 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100/75 hover:text-slate-950 dark:text-neutral-400 dark:hover:bg-neutral-700/50 dark:hover:text-neutral-50">
                <svg class="w-5 h-5 flex-none opacity-40 group-hover:opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span class="grow">Meu Perfil</span>
              </a>
              <a href="/settings" role="menuitem" @click="open = false"
                class="group flex items-center gap-2.5 rounded-lg px-2.5 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100/75 hover:text-slate-950 dark:text-neutral-400 dark:hover:bg-neutral-700/50 dark:hover:text-neutral-50">
                <svg class="w-5 h-5 flex-none opacity-40 group-hover:opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                <span class="grow">Configurações</span>
              </a>
            </div>

            <!-- Pinemix Dark Mode Toggle (pill-shaped) -->
            <div class="px-4 py-3">
              <div class="flex items-center justify-between">
                <span class="flex items-center gap-2.5 text-sm font-medium text-slate-600 dark:text-neutral-400">
                  <svg class="w-5 h-5 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-13.66l-.71.71M4.05 19.95l-.71.71M21 12h-1M4 12H3m16.66 7.66l-.71-.71M4.05 4.05l-.71-.71M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                  </svg>
                  Tema
                </span>
                <div class="inline-flex rounded-full bg-slate-100/75 p-1 ring-1 ring-slate-200/90 dark:bg-neutral-950/50 dark:ring-neutral-700/50">
                  <div class="relative inline-flex items-center">
                    <!-- Sliding indicator -->
                    <div
                      x-cloak
                      class="absolute inset-y-0 left-0 w-1/3 rounded-full bg-white shadow-sm transition-transform duration-150 ease-out dark:bg-neutral-700/75"
                      :class="{
                        'translate-x-0': theme === 'light',
                        'translate-x-full': theme === 'auto',
                        'translate-x-[200%]': theme === 'dark',
                      }"
                    ></div>
                    <!-- Light -->
                    <label class="group relative flex">
                      <input class="peer absolute left-0 top-0 appearance-none opacity-0" type="radio" name="theme-switch" value="light"
                        :checked="theme === 'light'" @change="setTheme('light')"/>
                      <span class="relative flex cursor-pointer items-center justify-center rounded-lg p-2 text-slate-500 transition-transform duration-150 ease-out peer-checked:text-slate-900 hover:text-slate-900 dark:text-neutral-400 dark:peer-checked:text-white dark:hover:text-white">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                          <circle cx="12" cy="12" r="4"></circle>
                          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
                        </svg>
                      </span>
                    </label>
                    <!-- Auto/System -->
                    <label class="group relative flex">
                      <input class="peer absolute left-0 top-0 appearance-none opacity-0" type="radio" name="theme-switch" value="auto"
                        :checked="theme === 'auto'" @change="setTheme('auto')"/>
                      <span class="relative flex cursor-pointer items-center justify-center rounded-lg p-2 text-slate-500 transition-transform duration-150 ease-out peer-checked:text-slate-900 hover:text-slate-900 dark:text-neutral-400 dark:peer-checked:text-white dark:hover:text-white">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                          <path d="M18 8V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h8"></path>
                          <path d="M10 19v-3.96 3.15"></path>
                          <path d="M7 19h5"></path>
                          <rect height="10" rx="2" width="6" x="16" y="12"></rect>
                        </svg>
                      </span>
                    </label>
                    <!-- Dark -->
                    <label class="group relative flex">
                      <input class="peer absolute left-0 top-0 appearance-none opacity-0" type="radio" name="theme-switch" value="dark"
                        :checked="theme === 'dark'" @change="setTheme('dark')"/>
                      <span class="relative flex cursor-pointer items-center justify-center rounded-lg p-2 text-slate-500 transition-transform duration-150 ease-out peer-checked:text-slate-900 hover:text-slate-900 dark:text-neutral-400 dark:peer-checked:text-white dark:hover:text-white">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                          <path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"></path>
                        </svg>
                      </span>
                    </label>
                  </div>
                </div>
              </div>
            </div>

            <!-- Logout -->
            <div class="px-2.5 py-2">
              <a href="/logout" role="menuitem"
                class="group flex items-center gap-2.5 rounded-lg px-2.5 py-2 text-sm font-medium text-red-600 hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-900/30">
                <svg class="w-5 h-5 flex-none opacity-40 group-hover:opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                <span class="grow">Sair</span>
              </a>
            </div>
          </div>
        </div>
      </div>
      {% else %}
      <div class="flex items-center gap-3">
        <a href="/login" class="px-4 py-2 rounded-full text-sm font-medium text-slate-700 dark:text-neutral-300 hover:bg-slate-100 dark:hover:bg-neutral-700 transition-colors">Entrar</a>
        <a href="/register" class="px-4 py-2 rounded-full text-sm font-medium text-white bg-teal-500 hover:bg-teal-600 transition-colors">Criar conta</a>
      </div>
      {% endif %}
    </div>

  </div>
</header>
