{% extends "grid_page.html" %}

{% block title %}Home{% endblock %}

{% block section_title %}
<h1 class="text-2xl font-bold text-slate-800 dark:text-neutral-100 mb-6">Projetos</h1>
{% endblock %}

{% block grid_items %}
{% for project in projects %}
<a href="/projects/{{ project.id }}" class="bg-white dark:bg-neutral-800 rounded-xl overflow-hidden shadow-sm border border-slate-200 dark:border-neutral-700 hover:shadow-md transition-shadow cursor-pointer block">
  <div class="aspect-video bg-slate-200 dark:bg-neutral-700 overflow-hidden">
    {% if project.thumbnail_url %}
    <img src="{{ project.thumbnail_url }}" alt="{{ project.name }}" class="w-full h-full object-cover">
    {% else %}
    <div class="w-full h-full {{ project.placeholder_color }}"></div>
    {% endif %}
  </div>
  <div class="p-3">
    <span class="text-sm font-medium text-slate-800 dark:text-neutral-100">{{ project.name }}</span>
  </div>
</a>
{% endfor %}
{% endblock %}
