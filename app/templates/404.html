{% extends "base.html" %}
{% block title %}Página não encontrada{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
    <h1 class="text-7xl font-bold text-neutral-300 dark:text-neutral-600">404</h1>
    <p class="mt-4 text-xl text-neutral-600 dark:text-neutral-400">Página não encontrada</p>
    <p class="mt-2 text-sm text-neutral-500 dark:text-neutral-500">O endereço que você digitou não existe ou foi removido.</p>
    <a href="/"
       class="mt-6 inline-flex items-center gap-1.5 px-3 py-1.5 text-sm rounded-full bg-white dark:bg-neutral-700 hover:bg-slate-100 dark:hover:bg-neutral-600 border border-slate-400/50 dark:border-neutral-600/50 text-slate-500 dark:text-neutral-400 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        Voltar ao início
    </a>
</div>
{% endblock %}
