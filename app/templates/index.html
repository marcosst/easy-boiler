{% extends "base.html" %}

{% block title %}Hello World{% endblock %}

{% block content %}
<main class="container">
    <h1>Hello World!</h1>

    <section>
        <h2>Alpine.js</h2>
        <div x-data="{ count: 0 }">
            <p>Contador: <strong x-text="count"></strong></p>
            <button @click="count++">+1</button>
            <button class="btn-danger" @click="count = 0">Reset</button>
        </div>
    </section>

    <section>
        <h2>HTMX</h2>
        <button
            hx-get="/htmx/hello"
            hx-target="#htmx-result"
            hx-swap="innerHTML"
        >
            Carregar via HTMX
        </button>
        <div id="htmx-result"></div>
    </section>
</main>
{% endblock %}
