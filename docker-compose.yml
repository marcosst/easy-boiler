services:
  app:
    build: .
    command: ["app"]
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./midias:/app/midias
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/app.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  worker:
    build: .
    command: ["worker"]
    volumes:
      - ./data:/app/data
      - ./midias:/app/midias
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/app.db
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
